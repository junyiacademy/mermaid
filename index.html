<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid Diagram Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Mermaid Diagram Viewer</h1>
      <div class="controls">
        <button id="render-mode-btn" class="mode-btn" title="Switch between SVG and ASCII output">SVG</button>
        <label for="theme-select">Theme</label>
        <select id="theme-select"></select>
        <button id="download-svg-btn">Download SVG</button>
        <button id="copy-ascii-btn" hidden>Copy ASCII</button>
        <button id="share-btn">Copy Share Link</button>
      </div>
    </header>
    <main>
      <div class="editor-panel" id="editor-panel">
        <div class="panel-header editor-mobile-header">
          <button class="panel-toggle-btn" id="editor-mobile-toggle">
            <span class="panel-toggle-icon">&#9660;</span>
            <span>Code</span>
          </button>
        </div>
        <div class="editor-body" id="editor-body">
          <textarea id="editor" spellcheck="false" placeholder="Enter Mermaid syntax here..."></textarea>
        </div>
        <div class="editor-edge" id="editor-edge" title="Drag to resize, click to toggle">
          <span class="editor-edge-icon">&#9666;</span>
          <span class="editor-edge-label">Code</span>
        </div>
      </div>
      <div class="preview-container">
        <div class="preview-pane" id="preview-pane">
          <div id="preview"></div>
          <div id="error" class="error" hidden></div>
        </div>
        <div class="notes-panel" id="notes-panel" hidden>
          <div class="notes-edge" id="notes-edge" title="Drag to resize, click to toggle">
            <span class="notes-edge-icon">&#9650;</span>
            <span class="notes-edge-label">Notes</span>
          </div>
          <div class="panel-header notes-mobile-header">
            <button class="panel-toggle-btn" id="notes-mobile-toggle">
              <span class="panel-toggle-icon">&#9660;</span>
              <span>Notes</span>
            </button>
          </div>
          <div class="notes-content" id="notes-content"></div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
