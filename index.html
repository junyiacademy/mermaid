<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid Diagram Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Mermaid Diagram Viewer</h1>
      <div class="controls">
        <button id="render-mode-btn" class="mode-btn" title="Switch between SVG and ASCII output">SVG</button>
        <label for="theme-select">Theme</label>
        <select id="theme-select"></select>
        <button id="share-btn">Copy Share Link</button>
        <button id="mobile-toggle" class="mobile-toggle" title="Toggle editor">Code</button>
      </div>
    </header>
    <main>
      <div class="editor-pane" id="editor-pane">
        <textarea id="editor" spellcheck="false" placeholder="Enter Mermaid syntax here..."></textarea>
      </div>
      <div class="resize-handle" id="resize-handle">
        <button class="collapse-btn" id="collapse-btn" title="Toggle editor">&lsaquo;</button>
      </div>
      <div class="preview-container">
        <div class="preview-pane" id="preview-pane">
          <div id="preview"></div>
          <div id="error" class="error" hidden></div>
        </div>
        <div class="notes-panel" id="notes-panel" hidden>
          <div class="notes-header">
            <button class="notes-toggle-btn" id="notes-toggle-btn">
              <span class="notes-toggle-icon">&#9660;</span>
              <span>Notes</span>
            </button>
          </div>
          <div class="notes-content" id="notes-content"></div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
